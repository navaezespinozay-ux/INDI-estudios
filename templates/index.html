<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INDI - Asistente de Estudios</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
        }

        body {
            background-color: #000000;
            color: #e5e7eb;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Barra lateral izquierda */
        .sidebar {
            width: 260px;
            background-color: #171717;
            padding: 12px 8px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            border-right: 1px solid #262626;
            flex-shrink: 0;
        }

        .boton-nuevo {
            background-color: #262626;
            color: white;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 12px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
        }

        .boton-nuevo:hover {
            background-color: #333;
        }

        .sidebar-opcion {
            padding: 10px 8px;
            border-radius: 6px;
            font-size: 14px;
            color: #d1d5db;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-opcion:hover {
            background-color: #262626;
        }

        .sidebar-seccion {
            margin-top: 24px;
            padding: 0 8px;
        }

        .sidebar-titulo {
            font-size: 12px;
            color: #9ca3af;
            margin-bottom: 8px;
            font-weight: 500;
        }

        /* Área principal */
        .contenedor-principal {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 24px 32px;
        }

        /* Encabezado con el nombre INDI */
        .encabezado {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 40px;
        }

        .nombre-app {
            font-size: 20px;
            font-weight: 600;
            color: #f9fafb;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .texto-inicio {
            font-size: 28px;
            font-weight: 500;
            color: #f3f4f6;
            text-align: center;
            margin-bottom: 40px;
        }

        /* Accesos rápidos */
        .accesos-rapidos {
            display: flex;
            flex-direction: column;
            gap: 16px;
            align-items: center;
            margin-bottom: auto;
        }

        .acceso-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 15px;
            color: #d1d5db;
            cursor: pointer;
            transition: background 0.2s;
            width: 280px;
        }

        .acceso-item:hover {
            background-color: #1f1f1f;
        }

        /* Chat */
        #chat {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            flex: 1;
            overflow-y: auto;
            padding-bottom: 24px;
            display: none;
        }

        #chat.mostrar {
            display: block;
        }

        .mensaje {
            max-width: 85%;
            margin-bottom: 20px;
            line-height: 1.7;
            font-size: 15px;
            white-space: pre-wrap; /* ✅ Mantiene saltos de línea y espacios */
        }

        .mensaje-usuario {
            margin-left: auto;
            color: #f9fafb;
        }

        .mensaje-asistente {
            margin-right: auto;
            color: #e5e7eb;
        }

        /* ✅ Estilo de enlaces cliqueables */
        .mensaje-asistente a {
            color: #60a5fa;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s;
        }

        .mensaje-asistente a:hover {
            text-decoration: underline;
            color: #93c5fd;
        }

        /* Caja de entrada */
        .contenedor-entrada {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            position: relative;
        }

        #entrada {
            width: 100%;
            background-color: #1f1f1f;
            border: 1px solid #333;
            border-radius: 24px;
            padding: 16px 52px 16px 20px;
            color: white;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        #entrada:focus {
            border-color: #4b5563;
        }

        #entrada::placeholder {
            color: #9ca3af;
        }

        .boton-enviar {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background-color: #3b82f6;
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .boton-enviar:disabled {
            background-color: #374151;
            cursor: not-allowed;
        }

        .boton-enviar svg {
            width: 16px;
            height: 16px;
            fill: white;
        }

        /* Scrollbar personalizado */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #4b5563;
            border-radius: 3px;
        }

        /* Responsivo */
        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }
            .texto-inicio {
                font-size: 22px;
            }
            .encabezado {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <!-- Barra lateral -->
    <aside class="sidebar">
        <button class="boton-nuevo" onclick="nuevoChat()">
            <span>+</span> Nuevo chat
        </button>

        <div class="sidebar-opcion">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            Buscar
        </div>
        <div class="sidebar-opcion">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18M3 9h18"/></svg>
            Biblioteca
        </div>
        <div class="sidebar-opcion">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20V10M18 20V4M6 20v-6"/></svg>
            Proyectos
        </div>
        <div class="sidebar-opcion">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 3H8a5 5 0 00-5 5v8a5 5 0 005 5h8a5 5 0 005-5V8a5 5 0 00-5-5z"/><path d="M12 12m-1 0a1 1 0 1 0 2 0a1 1 0 1 0 -2 0"/></svg>
            Complementos
        </div>

        <div class="sidebar-seccion">
            <div class="sidebar-titulo">Recientes</div>
            <div class="sidebar-opcion">Historia del Perú</div>
            <div class="sidebar-opcion">Matemáticas</div>
            <div class="sidebar-opcion">Ciencias</div>
            <div class="sidebar-opcion">Lenguaje</div>
        </div>
    </aside>

    <!-- Área principal -->
    <main class="contenedor-principal">
        <div class="encabezado">
            <div class="nombre-app">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#10a37f" stroke-width="2"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/><path d="M12 6v6l4 2"/></svg>
                INDI ▾
            </div>
            <div style="font-size: 14px; color: #9ca3af;">Asistente de Estudios</div>
        </div>

        <div id="inicio" class="texto-inicio">¿Cuál es el tema de hoy?</div>

        <div id="accesos" class="accesos-rapidos">
            <div class="acceso-item">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
                Preguntar sobre un tema de estudio
            </div>
            <div class="acceso-item">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20V10M18 20V4M6 20v-6"/></svg>
                Explicar un concepto difícil
            </div>
            <div class="acceso-item">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/><path d="M2 12h20"/></svg>
                Practicar con cuestionarios
            </div>
        </div>

        <div id="chat"></div>

        <div class="contenedor-entrada">
            <input type="text" id="entrada" placeholder="Pregunta lo que quieras sobre tus temas de estudio...">
            <button id="enviar" class="boton-enviar">
                <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
            </button>
        </div>
    </main>

    <script>
        const chat = document.getElementById('chat');
        const entrada = document.getElementById('entrada');
        const enviar = document.getElementById('enviar');
        const inicio = document.getElementById('inicio');
        const accesos = document.getElementById('accesos');

        // ✅ Convierte enlaces en cliqueables
        function convertirEnlaces(texto) {
            const patron = /(https?:\/\/[^\s\n]+)/g;
            return texto.replace(patron, '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>');
        }

        // Nuevo chat
        function nuevoChat() {
            chat.innerHTML = '';
            chat.classList.remove('mostrar');
            inicio.style.display = 'block';
            accesos.style.display = 'flex';
            entrada.value = '';
        }

        // Agregar mensaje (con enlaces ya convertidos)
        function agregarMensaje(texto, tipo) {
            const div = document.createElement('div');
            div.classList.add('mensaje', `mensaje-${tipo}`);
            // Si es del asistente, convertimos enlaces y usamos HTML
            if (tipo === 'asistente') {
                div.innerHTML = convertirEnlaces(texto);
            } else {
                div.textContent = texto;
            }
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        // Enviar consulta
        async function consultar() {
            const texto = entrada.value.trim();
            if (!texto) return;

            // Ocultar elementos de inicio
            inicio.style.display = 'none';
            accesos.style.display = 'none';
            chat.classList.add('mostrar');

            // Mostrar pregunta del usuario
            agregarMensaje(texto, 'usuario');
            entrada.value = '';
            enviar.disabled = true;

            try {
                const res = await fetch('/consultar', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ pregunta: texto })
                });
                const datos = await res.json();
                agregarMensaje(datos.respuesta, 'asistente');
            } catch (err) {
                agregarMensaje('Error al conectar con el asistente.', 'asistente');
            } finally {
                enviar.disabled = false;
            }
        }

        // Eventos
        enviar.addEventListener('click', consultar);
        entrada.addEventListener('keydown', e => e.key === 'Enter' && consultar());
    </script>
</body>
</html>
