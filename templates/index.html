<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INDI - Asistente de Estudios</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
        }

        html, body {
            background-color: #000000;
            color: #e5e7eb;
            height: 100%;
            display: flex;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        /* Barra lateral izquierda */
        .sidebar {
            width: 260px;
            background-color: #171717;
            padding: 12px 8px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            border-right: 1px solid #262626;
            flex-shrink: 0;
        }

        .boton-nuevo {
            background-color: #262626;
            color: white;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 12px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
        }

        .boton-nuevo:hover {
            background-color: #333;
        }

        .sidebar-opcion {
            padding: 10px 8px;
            border-radius: 6px;
            font-size: 14px;
            color: #d1d5db;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-opcion:hover {
            background-color: #262626;
        }

        .sidebar-seccion {
            margin-top: 24px;
            padding: 0 8px;
        }

        .sidebar-titulo {
            font-size: 12px;
            color: #9ca3af;
            margin-bottom: 8px;
            font-weight: 500;
        }

        /* Área principal */
        .contenedor-principal {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 24px 32px;
            height: 100%;
            min-height: 0;
        }

        .encabezado {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            flex-shrink: 0;
        }

        .nombre-app {
            font-size: 20px;
            font-weight: 600;
            color: #f9fafb;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* === GATO PIXELADO CON ANIMACIÓN === */
        .gato-inicio {
            width: 180px;
            height: auto;
            margin: 0 auto 16px;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            animation: flotar 3s ease-in-out infinite;
        }

        @keyframes flotar {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        .texto-inicio {
            font-size: 28px;
            font-weight: 500;
            color: #f3f4f6;
            text-align: center;
            margin: 0 0 20px;
            padding: 0;
        }

        .accesos-rapidos {
            display: flex;
            flex-direction: column;
            gap: 16px;
            align-items: center;
            margin: auto 0;
            padding: 20px;
        }

        .acceso-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 15px;
            color: #d1d5db;
            cursor: pointer;
            transition: background 0.2s;
            width: 280px;
            max-width: 90%;
        }

        .acceso-item:hover {
            background-color: #1f1f1f;
        }

        #chat {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 10px 0 20px;
            display: none;
            min-height: 0;
        }

        #chat.mostrar {
            display: block;
        }

        .mensaje {
            max-width: 85%;
            margin-bottom: 20px;
            line-height: 1.7;
            font-size: 15px;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .mensaje-usuario {
            margin-left: auto;
            color: #f9fafb;
        }

        .mensaje-asistente {
            margin-right: auto;
            color: #e5e7eb;
        }

        .mensaje-asistente a {
            color: #60a5fa;
            text-decoration: underline;
            font-weight: 500;
            transition: all 0.2s;
            cursor: pointer;
        }

        .mensaje-asistente a:hover {
            color: #93c5fd;
            text-decoration: none;
        }

        .contenedor-entrada {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            position: relative;
            flex-shrink: 0;
            padding: 10px 0 15px;
        }

        #entrada {
            width: 100%;
            background-color: #1f1f1f;
            border: 1px solid #333;
            border-radius: 24px;
            padding: 14px 50px 14px 18px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
            -webkit-appearance: none;
            appearance: none;
        }

        #entrada:focus {
            border-color: #4b5563;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        #entrada::placeholder {
            color: #9ca3af;
            font-size: 15px;
        }

        .boton-enviar {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background-color: #3b82f6;
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            flex-shrink: 0;
        }

        .boton-enviar:disabled {
            background-color: #374151;
            cursor: not-allowed;
        }

        .boton-enviar svg {
            width: 16px;
            height: 16px;
            fill: white;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #4b5563;
            border-radius: 3px;
        }

        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }
            .contenedor-principal {
                padding: 15px 12px;
            }
            .texto-inicio {
                font-size: 22px;
            }
            .encabezado {
                justify-content: center;
            }
            .acceso-item {
                width: 100%;
            }
            .mensaje {
                max-width: 92%;
                font-size: 15px;
            }
            .contenedor-entrada {
                padding: 8px 0 12px;
            }
            #entrada {
                font-size: 16px;
                padding: 13px 48px 13px 16px;
            }
            .gato-inicio {
                width: 140px;
            }
        }
    </style>
</head>
